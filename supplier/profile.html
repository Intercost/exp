<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Company Profile | Supplier Portal | Exp Supplier Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="brand-rail" aria-hidden="true"></div>
<div class="sidebar-scrim"></div>

<aside class="dash-sidebar">
  <div class="dash-sidebar-head">
    <a href="../index.html" class="exp-logo">
      <img src="../assets/exp-logo.png" alt="Exp" width="38" height="22">
      <span class="logo-word" style="font-size:13px;">SUPPLIER&nbsp;NETWORK</span>
    </a>
  </div>
  <nav class="dash-nav" aria-label="Supplier portal navigation">
    <div class="dash-nav-label">Supplier portal</div>
    <a href="dashboard.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="products.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
      My products
    </a>
    <a href="categories.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      My categories
    </a>
    <div class="dash-nav-label">Account</div>
    <a href="profile.html" class="is-active">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Company profile
    </a>
  </nav>
  <div class="dash-sidebar-foot">
    <a href="../index.html" style="margin-bottom:12px; display:block; text-align:center; color:var(--text-muted); font-size:13px; text-decoration:none;">
      ← Back to home
    </a>
    <button class="btn btn-ghost" style="width:100%; justify-content:flex-start; padding:10px 16px; font-size:14px; color:var(--text-muted);" id="signOutLink">Sign out</button>
  </div>
</aside>

<div class="dash-main">
  <header class="dash-topbar">
    <div style="display:flex; align-items:center; gap:14px;">
      <button class="btn btn-icon btn-ghost sidebar-toggle" data-sidebar-toggle aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <h1 class="dash-topbar-title">Company profile</h1>
    </div>
  </header>

  <div class="dash-content">
    <form id="profileForm">
      <div class="panel" style="margin-bottom:24px;">
        <div class="panel-head"><h2>Business details</h2></div>
        <div class="panel-body">
          <div class="field">
            <label for="pCompany">Business name</label>
            <input class="input" id="pCompany" name="pCompany" placeholder="Your company (Pty) Ltd">
          </div>
          <div class="input-group-row">
            <div class="field">
              <label for="pReg">Business registration no.</label>
              <input class="input" id="pReg" name="pReg" placeholder="e.g. 2014/000000/07">
            </div>
            <div class="field">
              <label for="pVat">VAT number</label>
              <input class="input" id="pVat" name="pVat" placeholder="If registered for VAT">
            </div>
          </div>
          <div class="field">
            <label for="pAddress">Business address</label>
            <textarea class="input" id="pAddress" name="pAddress" placeholder="Street, suburb, city, postal code"></textarea>
          </div>
          <div class="field">
            <label for="pAbout">About your company</label>
            <textarea class="input" id="pAbout" name="pAbout" placeholder="What you do, notable clients, years in operation…"></textarea>
          </div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:24px;">
        <div class="panel-head"><h2>Primary contact</h2></div>
        <div class="panel-body">
          <div class="input-group-row">
            <div class="field">
              <label for="pContact">Contact name</label>
              <input class="input" id="pContact" name="pContact" placeholder="Full name">
            </div>
            <div class="field">
              <label for="pPhone">Phone</label>
              <input class="input" type="tel" id="pPhone" name="pPhone" placeholder="+27 00 000 0000">
            </div>
          </div>
          <div class="field">
            <label for="pEmail">Email</label>
            <input class="input" type="email" id="pEmail" name="pEmail" placeholder="you@yourcompany.com">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>Password</h2></div>
        <div class="panel-body">
          <div class="input-group-row">
            <div class="field">
              <label for="pNewPassword">New password</label>
              <input class="input" type="password" id="pNewPassword" name="pNewPassword" placeholder="Leave blank to keep current password">
            </div>
            <div class="field">
              <label for="pConfirmPassword">Confirm new password</label>
              <input class="input" type="password" id="pConfirmPassword" name="pConfirmPassword">
            </div>
          </div>
        </div>
        <div class="modal-foot" style="border-top:1px solid var(--exp-line); justify-content:flex-end;">
          <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  // Check if user is logged in
  document.addEventListener('DOMContentLoaded', async () => {
    const currentUser = ExpAPI.getCurrentUser();
    if (!currentUser || currentUser.type !== 'supplier') {
      window.location.href = 'login.html';
      return;
    }

    // Sign out handler
    document.getElementById('signOutLink').addEventListener('click', (e) => {
      e.preventDefault();
      ExpAPI.logout();
      window.location.href = 'login.html';
    });

    // Pre-fill the form with current user data
    const form = document.getElementById('profileForm');
    if (currentUser.company_name) form.pCompany.value = currentUser.company_name;
    if (currentUser.contact_name) form.pContact.value = currentUser.contact_name;
    if (currentUser.email) form.pEmail.value = currentUser.email;
    if (currentUser.phone) form.pPhone.value = currentUser.phone;
    if (currentUser.business_reg_no) form.pReg.value = currentUser.business_reg_no;
    if (currentUser.vat_no) form.pVat.value = currentUser.vat_no;
    if (currentUser.business_address) form.pAddress.value = currentUser.business_address;
    if (currentUser.about) form.pAbout.value = currentUser.about;
  });

  // Profile form handler
  document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!window.expGuardSubmit("Profile changes will save once the backend is connected.")) {
      return;
    }

    // Validate password if provided
    const newPassword = form.pNewPassword.value;
    const confirmPassword = form.pConfirmPassword.value;
    if (newPassword && newPassword !== confirmPassword) {
      window.expToast("New passwords do not match.", "error");
      return;
    }

    const profileData = {
      companyName: form.pCompany.value.trim(),
      contactName: form.pContact.value.trim(),
      email: form.pEmail.value.trim(),
      phone: form.pPhone.value.trim(),
      businessRegNo: form.pReg.value.trim(),
      vatNo: form.pVat.value.trim(),
      businessAddress: form.pAddress.value.trim(),
      about: form.pAbout.value.trim(),
      password: newPassword ? newPassword : undefined
    };

    const res = await ExpAPI.updateMyProfile(profileData);
    if (res.ok) {
      window.expToast("Profile updated successfully.", "success");
    } else {
      window.expToast(res.error || "Couldn't update profile.", "error");
    }
  });
</script>
</body>
</html>
