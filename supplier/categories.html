<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>My Categories | Supplier Portal | Exp Supplier Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="brand-rail" aria-hidden="true"></div>
<div class="sidebar-scrim"></div>

<aside class="dash-sidebar">
  <div class="dash-sidebar-head">
    <a href="../index.html" class="exp-logo">
      <img src="../assets/exp-logo.png" alt="Exp" width="38" height="22">
      <span class="logo-word" style="font-size:13px;">SUPPLIER&nbsp;NETWORK</span>
    </a>
  </div>
  <nav class="dash-nav" aria-label="Supplier portal navigation">
    <div class="dash-nav-label">Supplier portal</div>
    <a href="dashboard.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="products.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
      My products
    </a>
    <a href="categories.html" class="is-active">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      My categories
    </a>
    <div class="dash-nav-label">Account</div>
    <a href="profile.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Company profile
    </a>
  </nav>
  <div class="dash-sidebar-foot">
    <a href="../index.html" style="margin-bottom:12px; display:block; text-align:center; color:var(--text-muted); font-size:13px; text-decoration:none;">
      ← Back to home
    </a>
    <button class="btn btn-ghost" style="width:100%; justify-content:flex-start; padding:10px 16px; font-size:14px; color:var(--text-muted);" id="signOutLink">Sign out</button>
  </div>
</aside>

<div class="dash-main">
  <header class="dash-topbar">
    <div style="display:flex; align-items:center; gap:14px;">
      <button class="btn btn-icon btn-ghost sidebar-toggle" data-sidebar-toggle aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <h1 class="dash-topbar-title">My categories</h1>
    </div>
  </header>

  <div class="dash-content">
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>Update your category & subcategory</h2>
          <p class="muted" style="font-size:12.5px; margin-top:4px;">This is how staff filter and find you in the marketplace.</p>
        </div>
      </div>
      <form id="categoriesForm">
        <div class="panel-body">
          <div class="stack-sm">
            <div class="field">
              <label for="categorySelect">Category</label>
              <select id="categorySelect" class="input">
                <option value="">Select a category…</option>
                <option value="Event Production & Infrastructure">Event Production &amp; Infrastructure</option>
                <option value="Branding, Print & Merchandising">Branding, Print &amp; Merchandising</option>
                <option value="Creative Production & Media">Creative Production &amp; Media</option>
                <option value="Logistics & Field Operations">Logistics &amp; Field Operations</option>
                <option value="Hospitality & Catering">Hospitality &amp; Catering</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="field sub-reveal" id="otherCategoryWrap" style="display:none;">
              <label for="otherCategory">Specify your category</label>
              <input type="text" id="otherCategory" class="input" placeholder="e.g. Waste Management">
            </div>

            <div class="field sub-reveal" id="subcategoryWrap" style="display:none;">
              <label for="subcategorySelect">Subcategory</label>
              <select id="subcategorySelect" class="input">
                <option value="">Select a subcategory…</option>
              </select>
            </div>

            <div class="field sub-reveal" id="otherSubcategoryWrap" style="display:none;">
              <label for="otherSubcategory">Specify your products / services</label>
              <input type="text" id="otherSubcategory" class="input" placeholder="e.g. Eco-friendly packaging">
            </div>
          </div>
        </div>
        <div class="modal-foot" style="border-top:1px solid var(--exp-line); justify-content:flex-end;">
          <span class="muted" id="saveHint" style="font-size:12.5px; margin-right:auto; align-self:center;"></span>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  // Category/subcategory data
  const CATEGORIES = {
    'Event Production & Infrastructure': [
      'Venue', 'Sound & Audio', 'Lighting', 'Stage & Structures',
      'Event Planning', 'Catering', 'Transport', 'Security', 'Other'
    ],
    'Branding, Print & Merchandising': [
      'Logo Design', 'Brand Identity', 'Packaging', 'Print',
      'Signage', 'Merchandise', 'Other'
    ],
    'Creative Production & Media': [
      'Video Production', 'Photography', 'Animation',
      'Content Creation', 'Copywriting', 'Social Media', 'Other'
    ],
    'Logistics & Field Operations': [
      'Transport', 'Warehousing', 'Distribution',
      'Courier', 'Storage', 'Handling', 'Other'
    ],
    'Hospitality & Catering': [
      'Accommodation', 'Catering', 'Bar Services',
      'Housekeeping', 'Concierge', 'Other'
    ],
    'Other': ['Other']
  };

  // Check if user is logged in
  document.addEventListener('DOMContentLoaded', async () => {
    const currentUser = ExpAPI.getCurrentUser();
    if (!currentUser || currentUser.type !== 'supplier') {
      window.location.href = 'login.html';
      return;
    }

    // Sign out handler
    document.getElementById('signOutLink').addEventListener('click', (e) => {
      e.preventDefault();
      ExpAPI.logout();
      window.location.href = 'login.html';
    });

    // Initialize category select
    const categorySelect = document.getElementById('categorySelect');
    const otherCategoryWrap = document.getElementById('otherCategoryWrap');
    const otherCategoryInput = document.getElementById('otherCategory');
    const subcategoryWrap = document.getElementById('subcategoryWrap');
    const subcategorySelect = document.getElementById('subcategorySelect');
    const otherSubcategoryWrap = document.getElementById('otherSubcategoryWrap');
    const otherSubcategoryInput = document.getElementById('otherSubcategory');

    // Populate current category/subcategory from user profile
    if (currentUser.category) {
      // Check if the category is one of our predefined ones or "Other"
      if (Object.keys(CATEGORIES).includes(currentUser.category)) {
        categorySelect.value = currentUser.category;
      } else {
        categorySelect.value = 'Other';
        otherCategoryInput.value = currentUser.category;
        otherCategoryWrap.style.display = 'block';
      }

      // Trigger category change to populate subcategories
      if (categorySelect.value) {
        populateSubcategories(categorySelect.value);
        if (currentUser.subcategory) {
          // Check if subcategory is predefined or "Other"
          const subs = CATEGORIES[categorySelect.value] || ['Other'];
          if (subs.includes(currentUser.subcategory)) {
            subcategorySelect.value = currentUser.subcategory;
          } else {
            subcategorySelect.value = 'Other';
            otherSubcategoryInput.value = currentUser.subcategory;
            otherSubcategoryWrap.style.display = 'block';
          }
        }
      }
    }

    // Category change handler
    categorySelect.addEventListener('change', function () {
      const val = this.value;
      otherCategoryInput.value = '';
      otherSubcategoryInput.value = '';
      
      if (val === 'Other') {
        otherCategoryWrap.style.display = 'block';
      } else {
        otherCategoryWrap.style.display = 'none';
      }

      if (val) {
        populateSubcategories(val);
      } else {
        subcategoryWrap.style.display = 'none';
        otherSubcategoryWrap.style.display = 'none';
      }
    });

    // Subcategory change handler
    subcategorySelect.addEventListener('change', function () {
      if (this.value === 'Other') {
        otherSubcategoryWrap.style.display = 'block';
      } else {
        otherSubcategoryWrap.style.display = 'none';
      }
    });
  });

  function populateSubcategories(category) {
    const subcategorySelect = document.getElementById('subcategorySelect');
    const subcategoryWrap = document.getElementById('subcategoryWrap');
    subcategorySelect.innerHTML = '<option value="">Select a subcategory…</option>';
    const subs = CATEGORIES[category] || ['Other'];
    subs.forEach(sub => {
      const option = document.createElement('option');
      option.value = sub;
      option.textContent = sub;
      subcategorySelect.appendChild(option);
    });
    subcategoryWrap.style.display = 'block';
  }

  function getFinalCategory() {
    const val = document.getElementById('categorySelect').value;
    if (val === 'Other') return document.getElementById('otherCategory').value.trim();
    return val;
  }

  function getFinalSubcategory() {
    const val = document.getElementById('subcategorySelect').value;
    if (val === 'Other') return document.getElementById('otherSubcategory').value.trim();
    return val;
  }

  // Categories form handler
  document.getElementById("categoriesForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = "Saving…";

    const finalCategory = getFinalCategory();
    const finalSubcategory = getFinalSubcategory();

    // Update supplier profile
    const currentUser = ExpAPI.getCurrentUser();
    const res = await ExpAPI.updateMyProfile({
      ...currentUser,
      category: finalCategory,
      subcategory: finalSubcategory
    });

    // Also update supplier_categories
    if (finalCategory) {
      await ExpAPI.updateMyCategories([finalCategory]);
    }

    if (res.ok) {
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById("saveHint").textContent = ExpAPI.isBackendReady() 
        ? (res.error || "Couldn't save.") 
        : "Saved locally. Will sync once the backend is connected.";
      btn.disabled = false; btn.textContent = "Save";
    }
  });
</script>
</body>
</html>
