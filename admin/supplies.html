<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>All Supplies | Admin Portal | Exp Supplier Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../css/styles.css">
<script src="../js/loader.js" defer></script>
</head>
<body>

<div class="brand-rail" aria-hidden="true"></div>
<div class="sidebar-scrim"></div>

<aside class="dash-sidebar">
  <div class="dash-sidebar-head">
    <a href="../index.html" class="exp-logo">
      <img src="../assets/exp-logo.png" alt="Exp" width="38" height="22">
      <span class="logo-word" style="font-size:13px;">SUPPLIER&nbsp;NETWORK</span>
    </a>
  </div>
  <nav class="dash-nav" aria-label="Admin portal navigation">
    <div class="dash-nav-label">Admin portal</div>
    <a href="dashboard.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="approvals.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
      Approval queue
    </a>
    <a href="vendors.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21V7l9-4 9 4v14"/><path d="M9 21V12h6v9"/></svg>
      Vendor list
    </a>
    <a href="supplies.html" class="is-active">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
      All supplies
    </a>
    <a href="../marketplace/index.html">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2 6 9H2l7 3-2.84 8.05L12 17l6.84 3.05L16 12l7-3h-4l-3-7Z"/></svg>
      Marketplace
    </a>
  </nav>
  <div class="dash-sidebar-foot">
    <a href="../index.html" style="margin-bottom:12px; display:block; text-align:center; color:var(--text-muted); font-size:13px; text-decoration:none;">
      ← Back to home
    </a>
    <button class="btn btn-ghost" style="width:100%; justify-content:flex-start; padding:10px 16px; font-size:14px; color:var(--text-muted);" id="signOutLink">Sign out</button>
  </div>
</aside>

<div class="dash-main">
  <header class="dash-topbar">
    <div style="display:flex; align-items:center; gap:14px;">
      <button class="btn btn-icon btn-ghost sidebar-toggle" data-sidebar-toggle aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <h1 class="dash-topbar-title">All supplies</h1>
    </div>
  </header>

  <!-- Image Modal -->
  <div id="imageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.85); z-index:9999; justify-content:center; align-items:center; padding:20px;">
    <div style="position:relative; max-width:90%; max-height:90%; display:flex; align-items:center; justify-content:center;">
      <img id="modalImage" src="" alt="Product image" style="max-width:100%; max-height:100%; object-fit:contain; border-radius:12px;">
      <button id="closeImageModal" style="position:absolute; top:-40px; right:0; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; padding:0; width:36px; height:36px; display:flex; align-items:center; justify-content:center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="dash-content">
    <div class="panel" style="margin-bottom:20px;">
      <div class="panel-pad">
        <div class="filter-bar" style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">
          <input class="input" placeholder="Search supplies by name or vendor…" style="max-width:320px;" id="supplySearch">
          <select class="input" style="max-width:220px;" id="categoryFilter">
            <option value="">All categories</option>
            <option value="Event Production & Infrastructure">Event Production & Infrastructure</option>
            <option value="Branding, Print & Merchandising">Branding, Print & Merchandising</option>
            <option value="Creative Production & Media">Creative Production & Media</option>
            <option value="Logistics & Field Operations">Logistics & Field Operations</option>
            <option value="Hospitality & Catering">Hospitality & Catering</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table class="data-table" id="suppliesTable">
          <thead>
            <tr>
              <th style="text-align:center; width:60px;">Photo</th>
              <th>Product/Service</th>
              <th>Vendor</th>
              <th>Category</th>
              <th>Price</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody id="suppliesTableBody">
            <!-- Supplies render here -->
          </tbody>
        </table>
      </div>
      <div class="empty-state" id="suppliesEmptyState">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
        </div>
        <h3>No supplies found</h3>
        <p>Products and services from approved vendors will be listed here.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  let allSupplies = [];

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('signOutLink').addEventListener('click', (e) => {
      e.preventDefault();
      ExpAPI.logout();
      window.location.href = 'login.html';
    });

    // Load all supplies
    await loadSupplies();

    // Add search/filter listeners
    document.getElementById('supplySearch').addEventListener('input', filterSupplies);
    document.getElementById('categoryFilter').addEventListener('change', filterSupplies);
  });

  async function loadSupplies() {
    const res = await ExpAPI.listAllSupplies();
    if (res.ok) {
      allSupplies = res.data;
      renderSupplies(allSupplies);
    }
  }

  function filterSupplies() {
    const search = document.getElementById('supplySearch').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;

    let filtered = allSupplies.filter(s => {
      let matchesSearch = !search || 
        s.name.toLowerCase().includes(search) ||
        (s.vendor_name && s.vendor_name.toLowerCase().includes(search));
      
      let matchesCategory = !category || s.category === category;
      
      return matchesSearch && matchesCategory;
    });

    renderSupplies(filtered);
  }

  // Image modal functionality
  const imageModal = document.getElementById('imageModal');
  const modalImage = document.getElementById('modalImage');
  const closeImageModal = document.getElementById('closeImageModal');

  window.openImageModal = function(imageUrl) {
    if (!imageUrl) return;
    modalImage.src = imageUrl;
    imageModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  };

  function closeImageModalFunc() {
    imageModal.style.display = 'none';
    document.body.style.overflow = 'auto';
    modalImage.src = '';
  }

  closeImageModal.addEventListener('click', closeImageModalFunc);
  
  imageModal.addEventListener('click', (e) => {
    if (e.target === imageModal) {
      closeImageModalFunc();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && imageModal.style.display === 'flex') {
      closeImageModalFunc();
    }
  });

  function renderSupplies(supplies) {
    const tableBody = document.getElementById('suppliesTableBody');
    const emptyState = document.getElementById('suppliesEmptyState');

    if (supplies.length === 0) {
      tableBody.innerHTML = '';
      emptyState.style.display = 'flex';
      return;
    }

    emptyState.style.display = 'none';
    tableBody.innerHTML = supplies.map(s => `
      <tr>
        <td style="text-align:center;">
          ${s.photo_url ? 
            `<div style="display:inline-block; width:50px; height:50px; border-radius:8px; overflow:hidden; background:#f5f5f5; cursor:pointer;" onclick="openImageModal('${s.photo_url}')">
              <img src="${s.photo_url}" alt="${s.name}" style="width:100%; height:100%; object-fit:cover; pointer-events:none;" title="Click to view full image">
            </div>` : 
            '<div style="width:50px; height:50px; border-radius:8px; background:#f5f5f5; display:flex; align-items:center; justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/></svg></div>'
          }
        </td>
        <td>
          <div style="font-weight:600;">${s.name}</div>
          ${s.unit ? `<div class="muted" style="font-size:12px;">${s.unit}</div>` : ''}
        </td>
        <td>
          <a href="vendor-detail.html?id=${s.vendor_id}" class="btn btn-ghost btn-xs" style="text-decoration:underline;">${s.vendor_name || '—'}</a>
        </td>
        <td>${s.category || '—'}</td>
        <td>${s.price ? 'Ksh ' + s.price.toFixed(2) : '—'}</td>
        <td><div class="muted" style="font-size:13px; max-width:300px;">${s.description || '—'}</div></td>
      </tr>
    `).join('');
  }
</script>
</body>
</html>
