<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Supplier Profile | Marketplace | Exp Supplier Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="../css/styles.css">
<script src="../js/loader.js" defer></script>
</head>
<body data-active="marketplace">

<header class="topnav">
  <div class="container topnav-inner">
    <a href="../index.html" class="exp-logo">
      <img src="../assets/exp-logo.png" alt="Exp" width="46" height="27">
      <span class="logo-word">SUPPLIER&nbsp;NETWORK</span>
    </a>
    <button class="btn btn-icon btn-ghost topnav-mobile-toggle" aria-label="Toggle navigation" data-topnav-toggle>
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
    <nav class="topnav-links" aria-label="Primary" id="topnavLinks">
      <a href="../index.html">Home</a>
      <a href="../supplier/login.html">Suppliers</a>
      <a href="index.html" class="is-active">Marketplace</a>
      <a href="../admin/login.html">Staff &amp; admin</a>
    </nav>
    <div class="topnav-actions"></div>
  </div>
</header>

<section class="container" style="padding:36px 0 80px;">
  <div style="margin-bottom:18px;">
    <a href="index.html" class="muted" style="font-size:13px; display:inline-flex; align-items:center; gap:6px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m15 18-6-6 6-6"/></svg>
      Back to marketplace
    </a>
  </div>

  <div id="profileWrap">
    <div class="empty-state" style="padding:90px 24px;">
      <div class="empty-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      </div>
      <h3>Loading supplier profile</h3>
      <p>Loading supplier information...</p>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container site-footer-inner">
    <p class="footer-quote">“Nothing ever becomes real until it is experienced” <cite>John Keats, 1819</cite></p>
    <p class="muted" style="font-size:12.5px;">© <span data-year></span> Experiential Marketing</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cache.js"></script>
<script src="../js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async function loadProfile() {
    const params = new URLSearchParams(window.location.search);
    const supplierId = params.get("id");
    if (!supplierId) {
      window.location.href = "index.html";
      return;
    }

    try {
      // Try the session cache first — avoids a round-trip if user came from the marketplace listing
      const cachedSuppliers = await ExpCache.getApprovedSuppliers();
      const fromCache = cachedSuppliers.find(s => s.id === supplierId);
      const res = fromCache
        ? { ok: true, data: fromCache }
        : await ExpAPI.getSupplierProfile(supplierId);

      if (!res.ok || !res.data) {
        document.getElementById("profileWrap").innerHTML = `
          <div class="empty-state" style="padding:90px 24px;">
            <div class="empty-icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
            </div>
            <h3>Supplier profile unavailable</h3>
            <p>We could not load this supplier. <a href="index.html">Back to marketplace</a></p>
          </div>`;
        return;
      }

      if (res.data) {
      const supplier = res.data;
      const products = supplier.products || [];

      document.getElementById("profileWrap").innerHTML = `
        <div style="display:flex; flex-direction:column; gap:32px;">
          <div style="display:flex; align-items:flex-start; gap:24px; padding-bottom:24px; border-bottom:1px solid #e5e5e5;">
            <div style="width:120px; height:120px; border-radius:50%; background:linear-gradient(130deg, var(--exp-red) 0%, #ff4d54 100%); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:white; font-family:var(--font-display); font-size:48px; font-weight:800; text-transform:uppercase; letter-spacing:-1px;">
              ${(supplier.company_name || 'S').charAt(0).toUpperCase()}
            </div>
            <div style="flex:1;">
              <h1 style="font-size:28px; margin:0 0 8px;">${supplier.company_name}</h1>
              <p class="muted" style="font-size:14px; margin:0 0 16px;">${supplier.contact_name} · ${supplier.email}</p>
              ${supplier.about ? `<p style="font-size:15px; line-height:1.6; margin:0;">${supplier.about}</p>` : ""}
            </div>
            <button class="btn btn-primary">Contact supplier</button>
          </div>

          <div>
            <h2 style="font-size:20px; margin:0 0 20px;">Products</h2>
            ${products.length === 0 ? `
              <div class="empty-state" style="padding:60px 24px;">
                <div class="empty-icon">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
                </div>
                <h3>No products yet</h3>
              </div>
            ` : `
              <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:20px;">
                ${products.map(product => `
                  <div class="panel" style="padding:16px;">
                    <div style="width:100%; height:160px; border-radius:12px; overflow:hidden; background:#f5f5f5; margin-bottom:12px;">
                      ${product.photo_url ? 
                        `<img src="${product.photo_url}" alt="${product.name}" style="width:100%; height:100%; object-fit:cover;">` : 
                        `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
                        </div>`
                      }
                    </div>
                    <div style="font-weight:500; margin-bottom:4px;">${product.name}</div>
                    <div class="muted" style="font-size:13px; margin-bottom:8px;">${product.category}</div>
                    <div style="font-weight:600; color:#FF7A72;">${product.price ? 'R' + product.price.toFixed(2) + ' ' + (product.unit || '') : 'Price on request'}</div>
                    <div class="muted" style="font-size:13px; margin-top:8px;">${product.description}</div>
                  </div>
                `).join("")}
              </div>
            `}
          </div>
        </div>
      `;
      }
    } catch (error) {
      console.error("[v0] Error loading supplier profile:", error);
      document.getElementById("profileWrap").innerHTML = `
        <div class="empty-state" style="padding:90px 24px;">
          <h3>Error loading profile</h3>
          <p>${error.message || 'An unexpected error occurred.'} <a href="index.html">Back to marketplace</a></p>
        </div>`;
    }
  });
</script>
</body>
</html>
